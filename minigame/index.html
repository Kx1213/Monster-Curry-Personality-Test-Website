<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Collect Ingredients — Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="screens">
      <div id="screen-intro" class="screen active">
        <h1>Collect the Ingredients</h1>
        <p class="muted">Drag horizontally to move the bowl. Tap or press Start to continue.</p>
        <button id="btn-start" class="btn">Start</button>
      </div>

      <div id="screen-ingredients" class="screen">
        <h2>Targets</h2>
        <div id="ingredients-list" class="targets"></div>
        <button id="btn-play" class="btn">Play</button>
      </div>

      <div id="screen-result" class="screen">
        <h2>Round Over</h2>
        <p id="final-score">Score: 0</p>
        <button id="btn-restart" class="btn">Play Again</button>
      </div>
    </div>

    <div id="hud">
      <div id="timer">60</div>
      <div id="score">0</div>
    </div>

    <div id="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
    </div>
  </div>

  <script src="game.js" defer></script>
</body>
</html>
